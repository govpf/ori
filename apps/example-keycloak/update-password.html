<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Définir un mot de passe · Polynésie française</title>
    <link rel="stylesheet" href="./ori.min.css" />
    <link rel="stylesheet" href="./auth.css" />
  </head>
  <body>
    <div class="demo-banner" role="region" aria-label="Avertissement de démonstration">
      <strong>DÉMO</strong>
      <span
        >Cette page illustre le design system Ori avec des données fictives. Aucune information
        saisie ici n'est transmise à un service réel.</span
      >
      <a class="demo-banner__link" href="https://ori.gov.pf" target="_blank" rel="noreferrer"
        >Voir la documentation Ori →</a
      >
    </div>
    <div class="back-bar"><a href="./index.html">← Retour à l'index</a></div>

    <div class="pf-auth-page">
      <div class="ori-card ori-card--elevated pf-auth-card">
        <div class="ori-card__body pf-auth-body">
          <div class="pf-auth-brand">
            <span class="brand-logo">
              <img src="./logo-pf.svg" alt="" aria-hidden="true" width="40" height="40" />
              <span class="brand-logo__text">
                <span class="brand-logo__title">Polynésie française</span>
                <span class="brand-logo__subtitle">Démarches en ligne</span>
              </span>
            </span>
          </div>

          <h1 class="pf-auth-title">Définir un mot de passe</h1>

          <form class="pf-auth-form" method="post">
            <div class="ori-field">
              <label for="password-new" class="ori-field__label ori-field__label--required"
                >Nouveau mot de passe</label
              >
              <input
                id="password-new"
                name="password-new"
                type="password"
                autocomplete="new-password"
                required
                class="ori-input"
              />
              <span class="ori-field__hint">12 caractères minimum, dont chiffre et symbole.</span>
            </div>
            <div class="ori-field">
              <label
                for="password-confirm"
                class="ori-field__label ori-field__label--required"
                >Confirmer le mot de passe</label
              >
              <input
                id="password-confirm"
                name="password-confirm"
                type="password"
                autocomplete="new-password"
                required
                class="ori-input"
              />
            </div>
            <button type="submit" class="ori-button ori-button--primary ori-button--block">
              Enregistrer
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
