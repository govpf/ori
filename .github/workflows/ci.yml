name: CI

# Pipeline de validation lancé sur chaque push et chaque pull request.
# Pas de déploiement ici (la CD est traitée séparément). Objectif :
# garantir que main reste vert et qu'aucune PR ne casse les builds, le
# format ou n'introduit de vulnérabilité critique.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissions minimales par défaut (principe du moindre privilège).
# Les jobs qui auraient besoin d'écrire (commenter une PR, etc.) doivent
# élargir explicitement.
permissions:
  contents: read

# Si une nouvelle exécution démarre sur la même branche/PR, on annule la
# précédente pour éviter les workflows zombies. Économie de minutes CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node 24 (Active LTS jusqu'à avril 2027) :
  # - require(ESM) stable (résout l'incompat ng-packagr 20.x avec
  #   find-cache-directory@6 qui est pure ESM)
  # - aligné sur le runner GitHub Actions (Node 24 par défaut à partir
  #   de juin 2026)
  # - support window plus long que Node 22 (Maintenance LTS depuis
  #   octobre 2025)
  # L'engines.node du package.json racine reste >=20.11.0 pour ne pas
  # forcer les consommateurs à upgrade ; la CI elle-même tourne en 24.
  NODE_VERSION: '24'
  # pnpm version alignée sur packageManager du package.json racine.
  PNPM_VERSION: '10.29.3'

jobs:
  # ─── Setup mutualisé ──────────────────────────────────────────────────
  # Réutilisable via `needs:` par les jobs qui suivent.
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

  # ─── Format check ─────────────────────────────────────────────────────
  format:
    name: Format check (Prettier)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prettier check
        run: pnpm format:check

  # ─── Build packages ───────────────────────────────────────────────────
  # Chaque package est buildé avec son outil natif (tsc, ng-packagr,
  # tailwindcss, style-dictionary). pnpm -r respecte l'ordre topologique
  # des dépendances workspace.
  build-packages:
    name: Build packages
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm -r --filter "./packages/*" build
      - name: Upload built packages (artifact)
        # Utile pour debug en cas de régression et pour les jobs aval qui
        # consomment dist/ (ori-site, storybooks).
        uses: actions/upload-artifact@v7
        with:
          name: packages-dist
          path: |
            packages/*/dist
            packages/*/build
          retention-days: 7
          if-no-files-found: error

  # ─── Tests unitaires ──────────────────────────────────────────────────
  # Vitest + @testing-library/react : couvre la logique des composants
  # React (callbacks, états, branches conditionnelles, navigation
  # clavier). Complémentaire des tests a11y axe-core (qui couvrent le
  # rendu DOM accessible des stories) et des stories Storybook elles-
  # mêmes (galerie visuelle).
  unit-tests-react:
    name: Unit tests React
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run Vitest
        run: pnpm --filter @govpf/ori-react test

  # ─── Build apps consommatrices ────────────────────────────────────────
  # Validation que tous les consommateurs (storybooks, site Astro, demo)
  # buildent correctement avec les packages publiés.
  build-storybook-react:
    name: Build Storybook React
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages first
        run: pnpm -r --filter "./packages/*" build
      - name: Build Storybook React
        run: pnpm --filter @govpf/ori-storybook-react build

  build-storybook-angular:
    name: Build Storybook Angular
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages first
        run: pnpm -r --filter "./packages/*" build
      - name: Build Storybook Angular
        run: pnpm --filter @govpf/ori-storybook-angular build

  # ─── Tests d'accessibilité automatisés ────────────────────────────────
  # axe-core est exécuté contre chaque story (build statique servi par
  # http-server) via @storybook/test-runner. Tags axe testés : wcag2a,
  # wcag2aa, wcag21a, wcag21aa, best-practice. Le job échoue dès qu'un
  # impact serious ou critical est remonté. Couvre le DS dans son ensemble :
  # toute story devient un test de non-régression a11y.
  a11y-storybook-react:
    name: A11y Storybook React
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm -r --filter "./packages/*" build
      - name: Build Storybook React
        run: pnpm --filter @govpf/ori-storybook-react build
      - name: Install Playwright Chromium
        run: pnpm --filter @govpf/ori-storybook-react exec playwright install --with-deps chromium
      - name: A11y test (axe-core)
        run: pnpm --filter @govpf/ori-storybook-react test:a11y:ci

  a11y-storybook-angular:
    name: A11y Storybook Angular
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm -r --filter "./packages/*" build
      - name: Build Storybook Angular
        run: pnpm --filter @govpf/ori-storybook-angular build
      - name: Install Playwright Chromium
        run: pnpm --filter @govpf/ori-storybook-angular exec playwright install --with-deps chromium
      - name: A11y test (axe-core)
        run: pnpm --filter @govpf/ori-storybook-angular test:a11y:ci

  build-site:
    name: Build site Astro
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages first
        run: pnpm -r --filter "./packages/*" build
      - name: Build site
        run: pnpm --filter @govpf/ori-site build

  build-demo-portail:
    name: Build demo-portail
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build packages first
        run: pnpm -r --filter "./packages/*" build
      - name: Build demo-portail
        run: pnpm --filter @govpf/ori-demo-portail build

  # ─── Audit sécurité ───────────────────────────────────────────────────
  # Bloquant sur critical, non-bloquant sur high (high peut venir de deps
  # transitives qu'on ne contrôle pas immédiatement). À durcir une fois
  # qu'un Dependabot/Renovate aura aplati le baseline.
  audit:
    name: Security audit (pnpm audit)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit critical only (blocking)
        run: pnpm audit --prod --audit-level critical
      - name: Audit high (informational)
        run: pnpm audit --prod --audit-level high || true

  # ─── Audit ciblé : packages publiés ───────────────────────────────────
  # Garde stricte : tolérance zéro sur les paths qui commencent par
  # `packages__` (= ce qui est installé chez les consommateurs des
  # packages npm publiés `@govpf/*`). Les vulnérabilités dans les apps
  # internes (`apps__*` : site doc, demos, playgrounds) restent gérées
  # par le job `audit` ci-dessus.
  #
  # Ce gate formalise la posture documentée dans SECURITY.md : un service
  # PF qui consomme @govpf/ori-react ne doit jamais hériter d'une CVE
  # connue via la supply chain Ori.
  audit-published:
    name: Security audit (published packages)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Fail on any vulnerability in published packages
        run: |
          # `pnpm audit --prod --json` renvoie un objet `advisories` quand
          # il trouve quelque chose, ou rien sinon (exit 0). On capture le
          # JSON et on filtre les paths qui touchent `packages/*`. Le
          # filtre `// {}` rend la commande robuste même si le champ
          # advisories est absent.
          json=$(pnpm audit --prod --json 2>/dev/null || true)
          paths=$(printf '%s' "$json" | jq -r '
            [.advisories // {}
             | to_entries[]
             | .value
             | {sev: .severity, pkg: .module_name, paths: .findings[].paths[]}
             | select(.paths | startswith("packages__"))
             | "\(.sev | ascii_upcase) - \(.pkg) via \(.paths)"
            ] | .[]
          ')
          if [ -n "$paths" ]; then
            echo "::error::Vulnérabilité détectée dans un package publié :"
            echo "$paths"
            exit 1
          fi
          echo "OK : aucune vulnérabilité dans les packages publiés."
