name: Release npm packages

# Publication des packages publishables sur npm public sous le scope
# @govpf/. Pilotée par Changesets : chaque PR qui modifie un package
# publishable doit embarquer un fichier `.changeset/*.md` qui décrit
# le bump (patch/minor/major) et la note de changelog.
#
# Workflow Changesets bot :
#   1. Sur push main, le job `release` regarde s'il y a des changesets
#      pendants (`.changeset/*.md` autres que `README.md` et `config.json`).
#   2. S'il y en a : la PR "Version Packages" est ouverte ou mise à jour
#      automatiquement. Cette PR consume les changesets, bumpe les
#      `package.json` des packages concernés et met à jour les
#      `CHANGELOG.md`.
#   3. Quand la PR "Version Packages" est mergée sur main, le job `release`
#      détecte que les versions ne sont plus en conflit avec npm et
#      publie chaque package via `pnpm publish`.
#
# Authentification npm via OIDC Trusted Publishers (pas de NPM_TOKEN
# en clair). Provenance signature automatique.
#
# Prérequis npm (à faire une fois) :
#   - Trusted publisher configuré au niveau de l'org @govpf, ou par
#     package, pointant vers ce repo et ce fichier de workflow.
#   - Environment GitHub "npm-release" créé dans Settings → Environments,
#     éventuellement avec des reviewers requis pour bloquer le publish
#     accidentel.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write # commits sur la PR Version Packages, GitHub Release
  pull-requests: write # ouverture / mise à jour de la PR Version Packages
  id-token: write # OIDC pour npm publish

# Une release à la fois. Si une nouvelle exécution démarre alors qu'une
# autre tourne, on attend que la précédente finisse (pas de cancel) :
# c'est un job idempotent mais qui ne doit pas se chevaucher pour ne pas
# créer deux PR de version concurrentes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.29.3'

jobs:
  release:
    name: Version & publish via Changesets
    runs-on: ubuntu-latest
    environment:
      name: npm-release
      url: https://www.npmjs.com/org/govpf
    steps:
      - uses: actions/checkout@v6
        with:
          # changesets/action a besoin de tout l'historique pour générer
          # les CHANGELOG (sinon les notes des commits anciens manquent).
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all publishable packages
        # Le build est nécessaire avant publish pour que les `dist/`
        # soient présents dans les tarballs.
        run: pnpm -r --filter "./packages/*" build

      - name: Create Release Pull Request or publish
        uses: changesets/action@v1
        with:
          # `version` consume les changesets, bumpe les versions et met
          # à jour les CHANGELOG. Sa sortie va dans la PR "Version
          # Packages" que le bot ouvre / met à jour.
          version: pnpm version-packages
          # `publish` est lancé après merge de la PR Version Packages :
          # changeset publish parcourt les packages dont la version
          # locale n'est pas encore sur npm et appelle `pnpm publish`
          # avec --provenance --access public. Le `pnpm publish` (et non
          # `npm publish`) est nécessaire pour résoudre les `workspace:*`
          # en versions concrètes lors du packaging du tarball, sinon le
          # tarball publié reste avec `workspace:*` et n'est pas
          # installable hors monorepo.
          publish: pnpm release
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # fallback si OIDC pas encore actif
